name: "Recipe Manager"
description: "AI-powered recipe manager backend. Parses Instagram/TikTok captions into structured recipes using Claude API."
version: "1.0.8"
slug: "recipe_manager"
init: false

# Show the "Open Web UI" button, opening the bundled Flutter web app served on port 8000.
webui: "http://[HOST]:[PORT:8000]/"

arch:
  - aarch64
  - amd64
  - armv7

options:
  claude_api_key: ""
  claude_model: "claude-sonnet-4-6"

schema:
  claude_api_key: str
  claude_model: str

ports:
  8000/tcp: 8000

ports_description:
  8000/tcp: "Recipe Manager API"

# Give read/write access to /data (persists the SQLite database across restarts)
map:
  - data:rw
