name: "Recipe Manager"
description: "AI-powered recipe manager backend. Parses Instagram/TikTok captions into structured recipes using Claude API."
version: "1.0.2"
slug: "recipe_manager"
init: false

arch:
  - aarch64
  - amd64
  - armv7

options:
  claude_api_key: ""
  claude_model: "claude-opus-4-6"

schema:
  claude_api_key: str
  claude_model: str

ports:
  8000/tcp: 8000

ports_description:
  8000/tcp: "Recipe Manager API"

# Give read/write access to /data (persists the SQLite database across restarts)
map:
  - data:rw
