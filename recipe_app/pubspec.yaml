name: recipe_app
description: Recipe Manager — import, search and browse your recipes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP client
  http: ^1.2.1
  # Share intent on Android
  receive_sharing_intent: ^1.8.0
  # Local config storage
  shared_preferences: ^2.3.2
  # URL launcher for opening source links
  url_launcher: ^6.3.0
  # Image caching
  cached_network_image: ^3.3.1
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
